name: F95 Discord Bot

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: f95-bot
  cancel-in-progress: false

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Ensure last_seen exists
        run: |
          if [ ! -f last_seen.json ]; then
            echo "[]" > last_seen.json
          fi

      - name: Run Discord Bot
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          echo "Starting F95 bot..."
          python f95_discord_bot.py

      - name: Show debug info
        run: |
          echo "==== FILES ===="
          ls -la

          echo "==== last_seen.json ===="
          cat last_seen.json || true

      - name: Commit state
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add last_seen.json

          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "auto update last_seen"

      - name: Sync with remote
        run: |
          git pull --rebase origin main || true

      - name: Push changes
        run: |
          git push origin main || git push --force origin main

      - name: Workflow finished
        run: echo "Bot completed successfully"
          git push || git push --force
