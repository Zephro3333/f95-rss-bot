name: F95 RSS Bot

permissions:
  contents: write

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        run: python f95_rss.py

      - name: Commit changes using GitHub bot (safe method)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto update RSS"
          file_pattern: f95_feed.xml last_seen.json
